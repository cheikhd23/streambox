<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="brand-block">
            <h1>StreamBox</h1>
            <p>Browse drama, comedy, thriller, and more. Watch anywhere.</p>
        </div>

        <nav class="site-nav">
            <a href="#">Home</a>
            <a href="#">Shows</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>

        <section id="hero">
            <h2>Stream what you love</h2>
            <p>Anytime, anywhere.</p>
            <button class="btn-primary">Browse</button>
        </section>

        <section id="featured">
            <h2>Featured Shows</h2>

            <article class="card">
                <h3>Show 1</h3>
                <p>Drama</p>
            </article>

            <article class="card">
                <h3>Show 2</h3>
                <p>Comedy</p>
            </article>

            <article class="card">
                <h3>Show 3</h3>
                <p>Thriller</p>
            </article>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 StreamBox</p>
        <p>All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
